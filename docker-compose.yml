version: "3.9"

services:

  backend:
    build: .
    container_name: ai-backend
    ports:
      - "8000:8000"
    restart: always

  frontend:
    image: node:18
    container_name: ai-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    depends_on:
      - backend
